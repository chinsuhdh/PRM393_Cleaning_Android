name: cleanai
description: "CleanAI — AI-powered cleaning booking platform."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.12.1 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^15.0.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0

  # UI / Fonts
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Utilities
  intl: ^0.20.2
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  url_launcher: ^6.3.2

  # Image Picker
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/